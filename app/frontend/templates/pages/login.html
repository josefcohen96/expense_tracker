{% extends "layout/base.html" %}
{% block title %}התחברות{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-md animate-fade-in">
    <!-- Brand -->
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-primary shadow-custom mb-3">
        <i class="fas fa-seedling text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">המנביטים</h1>
      <p class="text-gray-500 text-sm mt-1">ברוכים השבים — התחברו כדי להמשיך</p>
    </div>

    <div class="card overflow-hidden">
      <div class="card-header">
        <h2 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
          <i class="fas fa-right-to-bracket text-indigo-600"></i>
          התחברות
        </h2>
      </div>
      <form id="loginForm" method="post" action="/login">
        <div class="card-body space-y-4">
          {% if error %}
            <div class="flex items-center gap-2 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
              <i class="fas fa-circle-exclamation"></i>
              <span>{{ error }}</span>
            </div>
          {% endif %}
          <div class="form-group !mb-0">
            <label for="username" class="form-label">שם משתמש</label>
            <input type="text" id="username" name="username" required class="form-input" autocomplete="username" placeholder="הזינו שם משתמש">
          </div>
          <div class="form-group !mb-0">
            <label for="password" class="form-label">סיסמה</label>
            <input type="password" id="password" name="password" required class="form-input" autocomplete="current-password" placeholder="••••••••">
          </div>
        </div>
        <div class="card-footer flex justify-end bg-transparent border-0 pt-0">
          <button type="submit" class="btn btn-primary w-full">
            <i class="fas fa-sign-in-alt"></i>
            התחבר
          </button>
        </div>
      </form>
    </div>
    <p class="text-center text-xs text-gray-500 mt-4">
      <i class="fas fa-shield-halved ml-1 opacity-70"></i>
      כניסה מותרת רק למשתמש מורשה
    </p>
  </div>
</div>
<script>
  // Autofocus the username field on load.
  document.getElementById('username')?.focus();
</script>
{% endblock %}
