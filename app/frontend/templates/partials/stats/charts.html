<!-- פילטר לגרף החודשי לפי קטגוריה -->
<div class="flex flex-wrap gap-4 items-end mt-4">
  <div class="bg-white p-3 rounded shadow flex items-end gap-3">
    <div class="flex flex-col">
      <label for="monthly-category" class="text-sm text-gray-600">קטגוריה לגרף חודשי</label>
      <select id="monthly-category" class="border rounded px-2 py-1">
        <option value="total" selected>סה"כ</option>
        {% for c in categories %}
        <option value="{{ c.name }}">{{ c.name }}</option>
        {% endfor %}
      </select>
    </div>

  </div>
</div>

<!-- גרף חודשי -->
<h2 class="text-lg font-semibold mt-6 mb-2">הוצאות חודשיות (6 חודשים אחרונים)</h2>
<div class="bg-white p-4 rounded shadow" style="height: 320px;">
  <canvas id="monthly-chart"></canvas>
</div>
<div class="flex flex-col">
  <label for="donut-month-single" class="text-sm text-gray-600">חודש לדונאט</label>
  <input id="donut-month-single" type="month" value="{{ selected_month or '' }}" class="border rounded px-2 py-1">
</div>

<!-- דונאט קטגוריות -->
<h2 class="text-lg font-semibold mt-8 mb-2">התפלגות הוצאות לפי קטגוריה (חודש נבחר)</h2>

<div class="bg-white p-4 rounded shadow" style="height: 320px;">
  <canvas id="donut-chart"></canvas>
</div>

<!-- השוואה שנתית: השנה מול שנה שעברה -->
<h2 class="text-lg font-semibold mt-8 mb-2">הוצאות מול שנה שעברה</h2>

<div id="yearly-summary" class="grid grid-cols-3 gap-3 mb-3" style="display: none;">
  <div class="bg-white p-3 rounded shadow text-center">
    <div id="yearly-current-label" class="text-xs text-gray-500 mb-1"></div>
    <div id="yearly-current-value" class="font-mono text-lg font-bold text-indigo-600" dir="ltr"></div>
  </div>
  <div class="bg-white p-3 rounded shadow text-center">
    <div id="yearly-previous-label" class="text-xs text-gray-500 mb-1"></div>
    <div id="yearly-previous-value" class="font-mono text-lg font-bold text-gray-700" dir="ltr"></div>
  </div>
  <div class="bg-white p-3 rounded shadow text-center">
    <div class="text-xs text-gray-500 mb-1">שינוי</div>
    <div id="yearly-change" class="font-mono text-lg font-bold" dir="ltr"></div>
  </div>
</div>

<div class="bg-white p-4 rounded shadow" style="height: 320px;">
  <canvas id="yearly-chart"></canvas>
</div>

<!-- הסרת גרף הוצאות קבועות לפי דרישה -->
