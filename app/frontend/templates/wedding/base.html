{% extends "layout/base.html" %}

{% block title %}{% block wedding_title %}חתונה{% endblock %} - המנביטים{% endblock %}

{% block content %}
<div class="flex min-h-screen full-viewport-safe" dir="rtl">
    <!-- Sidebar (desktop only) -->
    <div class="hidden md:block w-64 bg-white shadow-lg border-l flex-shrink-0">
        <div class="p-6">
            <div class="flex items-center mb-6 gap-2">
                <span class="text-2xl">💍</span>
                <h2 class="text-xl font-bold text-gray-900">תכנון חתונה</h2>
            </div>
            <nav class="space-y-1">

                <a href="/wedding"
                   class="flex items-center px-3 py-2 text-sm font-medium rounded-md {% if request.path == '/wedding' %}bg-rose-100 text-rose-700{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5 ml-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    דשבורד
                </a>

                <a href="/wedding/vendors"
                   class="flex items-center px-3 py-2 text-sm font-medium rounded-md {% if 'vendors' in request.path %}bg-rose-100 text-rose-700{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5 ml-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                    </svg>
                    ספקים
                </a>

                <a href="/wedding/guests"
                   class="flex items-center px-3 py-2 text-sm font-medium rounded-md {% if 'guests' in request.path %}bg-rose-100 text-rose-700{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5 ml-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                    מוזמנים
                </a>

                <a href="/wedding/budget"
                   class="flex items-center px-3 py-2 text-sm font-medium rounded-md {% if 'budget' in request.path %}bg-rose-100 text-rose-700{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5 ml-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    תקציב
                </a>

                <a href="/wedding/tasks"
                   class="flex items-center px-3 py-2 text-sm font-medium rounded-md {% if 'tasks' in request.path %}bg-rose-100 text-rose-700{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5 ml-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                    </svg>
                    משימות
                </a>

            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 bg-gray-50 overflow-x-hidden w-full">
        <div class="p-3 sm:p-6 pb-24 md:pb-6">
            {% block wedding_content %}{% endblock %}
        </div>
    </div>
</div>

<!-- Mobile Bottom Navigation -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40 safe-area-bottom" dir="rtl">
    <div class="flex">
        <a href="/wedding"
           class="flex-1 flex flex-col items-center py-2 text-xs {% if request.path == '/wedding' %}text-rose-600{% else %}text-gray-500{% endif %}">
            <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            דשבורד
        </a>
        <a href="/wedding/guests"
           class="flex-1 flex flex-col items-center py-2 text-xs {% if 'guests' in request.path %}text-rose-600{% else %}text-gray-500{% endif %}">
            <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            מוזמנים
        </a>
        <a href="/wedding/vendors"
           class="flex-1 flex flex-col items-center py-2 text-xs {% if 'vendors' in request.path %}text-rose-600{% else %}text-gray-500{% endif %}">
            <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
            ספקים
        </a>
        <a href="/wedding/budget"
           class="flex-1 flex flex-col items-center py-2 text-xs {% if 'budget' in request.path %}text-rose-600{% else %}text-gray-500{% endif %}">
            <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            תקציב
        </a>
        <a href="/wedding/tasks"
           class="flex-1 flex flex-col items-center py-2 text-xs {% if 'tasks' in request.path %}text-rose-600{% else %}text-gray-500{% endif %}">
            <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
            משימות
        </a>
    </div>
</nav>
{% endblock %}
