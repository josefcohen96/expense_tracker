services:
  web:
    build: .
    container_name: expense_tracker
    ports:
      - "8080:8080"
    volumes:
      # Persist the sqlite database using a bind mount
      # Maps host folder (relative to docker-compose.yml) to container folder
      - ./budget.db:/app/app/backend/data/budget.db
    environment:
      # Use development settings for HTTP (non-SSL) access so cookies work
      - ENVIRONMENT=development
      # - RAILWAY_ENVIRONMENT=true
      - PORT=8080
      # Secrets must come from the host shell or a .env file alongside this file.
      # The ":?" suffix makes docker-compose fail fast if the variable is unset,
      # so we never silently boot with a default password.
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY:?SESSION_SECRET_KEY must be set (generate with: python -c "import secrets; print(secrets.token_urlsafe(64))")}
      - USER_PASSWORD_YOSEF=${USER_PASSWORD_YOSEF:?USER_PASSWORD_YOSEF must be set}
      - USER_PASSWORD_KARINA=${USER_PASSWORD_KARINA:?USER_PASSWORD_KARINA must be set}
    restart: unless-stopped